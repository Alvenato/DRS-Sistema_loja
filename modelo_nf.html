<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cupom Fiscal</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Estilos mantidos conforme seu design original */
        body { background: #f8fafc; margin: 0; padding: 40px 20px; font-family: sans-serif; display: flex; justify-content: center; }
        .cupom-fiscal-wrapper { background: #ffffff; padding: 25px 20px; width: 320px; border: 1px solid #e2e8f0; border-radius: 8px; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="no-print" style="margin-bottom: 15px;">
            <button onclick="enviarLinkWhatsapp()" style="background: #25D366; color: white; width: 100%; height: 48px; border-radius: 8px; border: none; cursor: pointer;">
                Enviar por WhatsApp
            </button>
        </div>
        
        <div class="cupom-fiscal-wrapper">
            <div style="text-align: center; font-family: 'Courier New', monospace; font-size: 11px;">
                <h3 id="nome-empresa">DEOCLECIANO RODRIGUES DA SILVA - ME</h3>
                <p>CNPJ: 26.785.852/0001-25</p>
                <div style="border-top: 1px dashed #000; margin: 10px 0;"></div>
                
                <table style="width: 100%; text-align: left;">
                    <tbody id="lista-itens">
                        </tbody>
                </table>
                
                <div style="border-top: 1px dashed #000; margin: 10px 0;"></div>
                <div style="font-size: 16px; font-weight: bold;">
                    TOTAL: R$ <span id="valor-total">0.00</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Exemplo: Dados que viriam do seu banco de dados ou URL
        const dadosVenda = {
            cliente: "João Silva",
            total: "150.00",
            telefone: "61999991111",
            itens: [
                { desc: "Camiseta Preta", qtd: 1, preco: 50.00 },
                { desc: "Calça Jeans", qtd: 1, preco: 100.00 }
            ]
        };

        // Renderiza itens
        const tbody = document.getElementById('lista-itens');
        dadosVenda.itens.forEach(item => {
            tbody.innerHTML += `<tr><td>${item.desc}</td><td>${item.qtd}</td><td>${item.preco.toFixed(2)}</td></tr>`;
        });
        document.getElementById('valor-total').innerText = dadosVenda.total;

        function enviarLinkWhatsapp() {
            let texto = `Olá! Segue seu cupom: ${window.location.href}`;
            window.open(`https://wa.me/55${dadosVenda.telefone}?text=${encodeURIComponent(texto)}`, "_blank");
        }
    </script>
</body>
</html>
