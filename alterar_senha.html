<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Primeiro Acesso - Alterar Senha</title>
</head>
<body class="login-page">
    <div class="login-container" style="width: 400px;">
        <h2>Primeiro Acesso Detectado</h2>
        <p style="color: #64748b; font-size: 13px; margin-bottom: 20px;">
            Por medidas de segurança, você deve alterar a senha padrão antes de continuar.
        </p>
        
        <form action="admin.html" method="GET">
            <input type="password" name="nova_senha" placeholder="Digite sua Nova Senha" required style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #e2e8f0; box-sizing: border-box;">
            <input type="password" name="confirmar_senha" placeholder="Confirme a Nova Senha" required style="width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #e2e8f0; box-sizing: border-box;">
            <button type="submit" class="btn-block" style="background: #10b981; border: none; padding: 14px; width: 100%; border-radius: 8px; color: white; cursor: pointer;">Salvar Nova Senha e Entrar</button>
        </form>
    </div>
</body>
</html>
