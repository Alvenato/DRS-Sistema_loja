<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PDV E-commerce</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; }
        .login-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; }
        .form-group { margin-bottom: 15px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .error-msg { color: red; font-size: 14px; margin-top: 10px; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Acessar Sistema</h2>
    <form id="loginForm">
        <div class="form-group">
            <input type="text" id="username" placeholder="Usuário" required>
        </div>
        <div class="form-group">
            <input type="password" id="password" placeholder="Senha" required>
        </div>
        <button type="submit">Entrar</button>
        <div id="errorMsg" class="error-msg">Usuário ou senha incorretos!</div>
    </form>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault();
        
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');

        // Lógica de simulação de autenticação
        if (user === 'admin' && pass === 'admin') {
            // Primeiro acesso obrigatório
            window.location.href = 'alterar_senha.html';
        } else if (user === 'admin' && pass === '1234') { 
            // Senha já alterada
            localStorage.setItem('auth_token', 'true'); // Token de sessão
            window.location.href = 'admin.html';
        } else {
            errorMsg.style.display = 'block';
        }
    });
</script>
</body>
</html>
